<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>安卓学习笔记</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 网页图标 -->
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=1">

  <!-- 主题样式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">

  <!-- Prism 代码高亮主题，放在 Docsify 主题后面 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism.min.css">

  <!-- 侧边栏折叠样式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar-folder.min.css">

  <!-- 自定义样式，放最后 -->
  <link rel="stylesheet" href="./styles/custom.css">
</head>

<body>
  <div id="app">加载中...</div>

  <script>
    window.$docsify = {
      name: '安卓学习笔记',
      repo: 'BaoLongS111/my-docs',
      loadSidebar: true,
      subMaxLevel: 2,
      sidebarDisplayLevel: 0,
      auto2top: true,
      homepage: 'README.md',
      themeColor: '#18a058',

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索笔记',
        noData: '没有找到相关内容',
        depth: 3
      },

      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },

      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true
      }
    }
  </script>

  <!-- Docsify 核心 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- 代码高亮语言包，必须放在 docsify.min.js 后面 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-clike.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-kotlin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-groovy.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-properties.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>

  <!-- Docsify 插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
